name: Build Release Jar

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Collect release jar
        shell: bash
        run: |
          mkdir -p dist

          mapfile -t jars < <(
            find build/libs -maxdepth 1 -type f -name "*.jar" \
              ! -name "*-sources.jar" \
              ! -name "*-javadoc.jar" \
              ! -name "*-dev.jar" \
              ! -name "*-deobf.jar"
          )

          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No release jar found in build/libs"
            find build/libs -maxdepth 1 -type f -print || true
            exit 1
          fi

          echo "Found jars:"
          printf '%s\n' "${jars[@]}"

          cp "${jars[@]}" dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MasterfulMachinery-jar
          path: dist/*.jar

      - name: Upload jar to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.jar --clobber