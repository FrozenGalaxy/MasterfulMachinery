name: Build Release Jar

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --console=plain --info --stacktrace

      - name: Collect release jar
        shell: bash
        run: |
          mkdir -p dist

          mapfile -t jars < <(
            find build/libs -maxdepth 1 -type f -name "*.jar" \
              ! -name "*-sources.jar" \
              ! -name "*-javadoc.jar" \
              ! -name "*-dev.jar" \
              ! -name "*-deobf.jar"
          )

          if [ "${#jars[@]}" -eq 0 ]; then
            echo "No release jar found in build/libs"
            find build/libs -maxdepth 1 -type f -print || true
            exit 1
          fi

          if [ "${#jars[@]}" -gt 1 ]; then
            echo "Multiple candidate release jars found:"
            printf '%s\n' "${jars[@]}"
            exit 1
          fi

          cp "${jars[0]}" dist/
          echo "JAR_NAME=$(basename "${jars[0]}")" >> "$GITHUB_ENV"

      - name: Upload raw jar artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/${{ env.JAR_NAME }}
          archive: false

      - name: Upload jar to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "dist/${JAR_NAME}" --clobber